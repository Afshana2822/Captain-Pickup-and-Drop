<!DOCTYPE html>
<html>
<head>
    <title>My Profile - Captain</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#F5F0E6;
        }

        .profile-box{
            width:60%;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .profile-img{
            width:150px;
            height:150px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #6F4E37;
            display:block;
            margin:auto;
            margin-bottom:20px;
        }

        h2{
            text-align:center;
            color:#6F4E37;
            margin-bottom:20px;
        }

        .detail{
            font-size:18px;
            margin-bottom:15px;
        }

        .btn-home{
            background:#6F4E37;
            color:white;
            width:100%;
            margin-top:20px;
        }

        .btn-home:hover{
            background:#4A2C2A;
            color:white;
        }

    </style>

</head>

<body>

<div class="profile-box">

    <h2>👤 My Profile</h2>

    <img id="photo"
         class="profile-img"
         src=""
         alt="Profile Photo">

    <div class="detail">
        <b>Full Name:</b>
        <span id="name"></span>
    </div>

    <div class="detail">
        <b>Date of Birth:</b>
        <span id="dob"></span>
    </div>

    <div class="detail">
        <b>Age:</b>
        <span id="age"></span>
    </div>

    <div class="detail">
        <b>Mobile Number:</b>
        <span id="mobile"></span>
    </div>

    <div class="detail">
        <b>City:</b>
        <span id="city"></span>
    </div>

    <div class="detail">
        <b>Country:</b>
        <span id="country"></span>
    </div>

    <a href="home.html" class="btn btn-home">
        🏠 Back to Home
    </a>

</div>

<script>

document.getElementById("photo").src =
localStorage.getItem("photo");

document.getElementById("name").innerHTML =
localStorage.getItem("name");

document.getElementById("dob").innerHTML =
localStorage.getItem("dob");

document.getElementById("age").innerHTML =
localStorage.getItem("age");

document.getElementById("mobile").innerHTML =
localStorage.getItem("mobile");

document.getElementById("city").innerHTML =
localStorage.getItem("city");

document.getElementById("country").innerHTML =
localStorage.getItem("country");

</script>

</body>
</html>
