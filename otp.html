<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#F5F0E6;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .otp-box{
            background:white;
            width:350px;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#6F4E37;
            font-weight:bold;
        }

        .btn-captain{
            background:#6F4E37;
            color:white;
            width:100%;
        }

        .btn-captain:hover{
            background:#4A2C2A;
            color:white;
        }
    </style>
</head>

<body>

<div class="otp-box">

    <h2>OTP Verification</h2>

    <p class="text-center">
        Enter OTP: <b>1234</b>
    </p>

    <input type="text"
           id="otp"
           class="form-control mb-3"
           placeholder="Enter OTP">

    <button class="btn btn-captain"
            onclick="verifyOTP()">
        Verify OTP
    </button>

</div>

<script>

function verifyOTP(){

    let otp =
    document.getElementById("otp").value;

    if(otp=="1234"){

        alert("Login Successful");

        window.location.href="profile-setup.html";
    }
    else{

        alert("Invalid OTP");
    }
}

</script>

</body>
</html>
