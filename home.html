<!DOCTYPE html>
<html>
<head>
    <title>Captain Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#340707;
            padding-bottom:80px;
        }

        .header{
            background:#340707;
            color:white;
            padding:20px;
            border-bottom-left-radius:25px;
            border-bottom-right-radius:25px;
        }

        .service-card{
            background:white;
            border-radius:15px;
            padding:20px;
            text-align:center;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
            cursor:pointer;
            transition:0.3s;
        }

        .service-card:hover{
            transform:scale(1.05);
        }

        .service-icon{
            font-size:40px;
        }

        .service-name{
            font-weight:bold;
            color:#6F4E37;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            width:100%;
            background:white;
            padding:10px;
            display:flex;
            justify-content:space-around;
            box-shadow:0px -2px 10px rgba(0,0,0,0.1);
        }

        .nav-link{
            text-decoration:none;
            color:#6F4E37;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="header">
    <h2>🚖 Captain</h2>
    <p>Book your ride easily</p>
</div>

<div class="container mt-4">

    <h4>Choose Your Ride</h4>

    <div class="row g-3">

        <div class="col-6">
            <div class="service-card"
                 onclick="window.location.href='bike.html'">
                <div class="service-icon">🏍️</div>
                <div class="service-name">Bike</div>
            </div>
        </div>

        <div class="col-6">
            <div class="service-card"
                 onclick="window.location.href='auto.html'">
                <div class="service-icon">🛺</div>
                <div class="service-name">Auto</div>
            </div>
        </div>

        <div class="col-6">
            <div class="service-card"
                 onclick="window.location.href='cab.html'">
                <div class="service-icon">🚕</div>
                <div class="service-name">Cab</div>
            </div>
        </div>

        <div class="col-6">
            <div class="service-card"
                 onclick="window.location.href='parcel.html'">
                <div class="service-icon">📦</div>
                <div class="service-name">Parcel</div>
            </div>
        </div>

    </div>

</div>

<div class="bottom-nav">

    <a href="home.html" class="nav-link">🏠 Home</a>

    <a href="#" class="nav-link">🚖 Services</a>

    <a href="profile.html" class="nav-link">👤 Profile</a>

</div>

</body>
</html>
