<!DOCTYPE html>
<html>
<head>
    <title>Captain Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#F5F0E6;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:20px;
            width:350px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:40px;
            text-align:center;
        }

        h2{
            color:#6F4E37;
            text-align:center;
            font-weight:bold;
        }

        .btn-captain{
            background:#6F4E37;
            color:white;
            width:100%;
        }

        .btn-captain:hover{
            background:#4A2C2A;
            color:white;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">🚖</div>

    <h2>CAPTAIN</h2>

    <p class="text-center">Ride with Comfort</p>

    <input type="text"
           id="mobile"
           class="form-control mb-3"
           placeholder="Enter Mobile Number">

    <button class="btn btn-captain"
            onclick="sendOTP()">
        Send OTP
    </button>

</div>

<script>

function sendOTP(){

    let mobile =
    document.getElementById("mobile").value;

    if(mobile.length != 10){

        alert("Enter valid mobile number");

        return;
    }

    alert("OTP Sent Successfully");

    window.location.href="otp.html";
}

</script>

</body>
</html>
